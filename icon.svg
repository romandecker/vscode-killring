<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#4C1D95"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>

  <!-- cycle ring: near-full circle with a gap, implying rotation -->
  <path d="M 178 74 A 74 74 0 1 1 78 74"
        fill="none" stroke="#EDE9FE" stroke-width="16" stroke-linecap="round"/>
  <!-- arrow head on the ring -->
  <path d="M 178 52 L 178 96 L 214 74 Z" fill="#EDE9FE"/>

  <!-- stacked clippings -->
  <g>
    <rect x="96" y="118" width="92" height="64" rx="12" fill="#C4B5FD"/>
    <rect x="84" y="104" width="92" height="64" rx="12" fill="#DDD6FE"/>
    <rect x="72" y="90"  width="92" height="64" rx="12" fill="#FFFFFF"/>
    <!-- text lines on the top clipping -->
    <rect x="86" y="108" width="60" height="9" rx="4.5" fill="#7C3AED"/>
    <rect x="86" y="126" width="44" height="9" rx="4.5" fill="#A78BFA"/>
  </g>
</svg>
